<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Alerts App | National Safety Awareness</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Weather Alerts App</h1>
  <p style="text-align: center; color: #555;">Enter a valid US state abbreviation (e.g., CA, NY, TX, MN)</p>
  
  <input type="text" id="state-input" placeholder="Enter state abbreviation (e.g., CA)">
  <button id="fetch-alerts">Get Weather Alerts</button>
  
  <!-- Loading Spinner -->
  <div id="loading-spinner">
    <div class="spinner"></div>
    <p>Fetching latest weather alerts...</p>
  </div>
  
  <div id="alerts-display"></div>
  <div id="error-message" class="hidden"></div>
  
  <script src="./index.js"></script>
</body>
</html>
